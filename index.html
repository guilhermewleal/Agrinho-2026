<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>GAIA Protocol</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="intro">
    <h1>🌍 Ano 2070</h1>
    <p>A Terra está em risco. Suas decisões definirão o futuro.</p>
    <button onclick="iniciar()">Iniciar Missão</button>
</div>

<div class="container" id="game" style="display:none;">

<h1>🌱 GAIA Protocol</h1>

<select id="regiao" onchange="selecionarRegiao()">
    <option value="Sul">Sul</option>
    <option value="Nordeste">Nordeste</option>
</select>

<p id="ano">Ano: 2070</p>
<p id="xp">XP: 0 | Nível: 1</p>
<p id="missao"></p>

<div class="status">
    <p>🌾 Produção: <span id="prod">50</span></p>
    <p>🌍 Ambiente: <span id="amb">50</span></p>
</div>

<div class="barra"><div id="equilibrio"></div></div>

<div class="acoes">
    <button onclick="acao(1)">💧 Irrigação IA</button>
    <button onclick="acao(2)">☣️ Químicos</button>
    <button onclick="acao(3)">🌱 Sustentável</button>
</div>

<canvas id="grafico" width="400" height="200"></canvas>

<p id="evento"></p>
<p id="ia"></p>
<p id="conquistas"></p>

<button onclick="final()">Finalizar</button>

<h3>🏆 Ranking</h3>
<ul id="ranking"></ul>

</div>

<script src="script.js"></script>
</body>
</html>
