<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>EcoAgro Simulator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>🌱 EcoAgro Simulator</h1>
    <p>Produção forte com equilíbrio ambiental</p>
</header>

<main>

<div class="painel">

    <div class="controle">
        <label>💧 Uso de Água</label>
        <input type="range" id="agua" min="0" max="100" value="50">
    </div>

    <div class="controle">
        <label>🧪 Fertilizantes</label>
        <input type="range" id="fertilizante" min="0" max="100" value="50">
    </div>

    <div class="controle">
        <label>🌳 Desmatamento</label>
        <input type="range" id="desmatamento" min="0" max="100" value="20">
    </div>

    <div class="controle">
        <label>⚡ Energia Renovável</label>
        <input type="range" id="energia" min="0" max="100" value="50">
    </div>

</div>

<div class="resultado">

    <h2>📊 Resultados</h2>

    <p>🌾 Produção: <span id="prod">0</span></p>
    <p>🌍 Sustentabilidade: <span id="sust">0</span></p>

    <div class="barra">
        <div id="barraNivel"></div>
    </div>

    <p id="mensagem"></p>

</div>

<div class="historico">
    <h3>📈 Histórico</h3>
    <ul id="lista"></ul>
</div>

</main>

<script src="script.js"></script>
</body>
</html>
